name: Build, Push, and Deploy Spring Boot App to Azure Web App

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: automotive-spring-boot-app
  AZURE_WEBAPP_NAME: automotive-spring-rz01
  AZURE_RESOURCE_GROUP: rg-automotive-spring-gwc

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Build Spring Boot app
        run: ./mvnw clean package -DskipTests

      - name: Log in to Azure Container Registry
        run: echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ secrets.ACR_LOGIN_SERVER }} -u "${{ secrets.ACR_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure Azure Web App to use ACR image
        run: |
          az webapp config container set \
            --name "$AZURE_WEBAPP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --container-image-name "${{ secrets.ACR_LOGIN_SERVER }}/${IMAGE_NAME}:${{ github.sha }}" \
            --container-registry-url "https://${{ secrets.ACR_LOGIN_SERVER }}" \
            --container-registry-user "${{ secrets.ACR_USERNAME }}" \
            --container-registry-password "${{ secrets.ACR_PASSWORD }}"

      - name: Set required app settings
        run: |
          az webapp config appsettings set \
            --name "$AZURE_WEBAPP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --settings \
              WEBSITES_PORT=8081 \
              PORT=8081 \
              SPRING_DATASOURCE_USERNAME="${{ secrets.MYSQL_ADMIN_USERNAME }}" \
              SPRING_DATASOURCE_PASSWORD="${{ secrets.MYSQL_ADMIN_PASSWORD }}" \
              SPRING_DATASOURCE_URL="${{ secrets.SPRING_DATASOURCE_URL }}"

      - name: Restart Azure Web App
        run: |
          az webapp restart \
            --name "$AZURE_WEBAPP_NAME" \
            --resource-group "$AZURE_RESOURCE_GROUP"