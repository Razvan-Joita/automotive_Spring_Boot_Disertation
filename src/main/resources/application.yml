spring:
  application:
    name: automotive_Spring_Boot_Disertation

  datasource:
    url: jdbc:mysql://localhost:3306/automotive_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: Jabulani2002@
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    org.springframework: INFO
    org.springframework.web: INFO
    com.automotive_Spring_Boot_Disertation: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    enable:
      all: true
    tags:
      application: automotive_Spring_Boot_Disertation
  prometheus:
    metrics:
      export:
        enabled: true